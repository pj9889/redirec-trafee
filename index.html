<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>
        /* বেসিক রিসেট এবং ফুল-স্ক্রিন সেটআপ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
        }

        /* ১ সেকেন্ড পর পর ব্যাকগ্রাউন্ড ছবি চেঞ্জ হওয়ার স্লাইডার */
        .bg-slider {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .bg-slide {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
        }
        .bg-slide.active {
            opacity: 1;
        }

        /* ওভারলে - লেখা ও লোগো পরিষ্কার দেখানোর জন্য */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: 2;
        }

        /* মেইন কন্টেইনার */
        .content-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* মাঝ বরাবর বাম থেকে ডান পর্যন্ত লোগো */
        .logo-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 25px;
            padding: 0 20px;
        }
        .logo-container img {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
        }

        /* টেক্সট অ্যানিমেশন ও স্টাইল */
        .text-line {
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 1.1;
            margin: 8px 0;
            opacity: 0;
        }

        /* ১ম লেখা: Many Holes */
        .text-many-holes {
            font-size: clamp(3.5rem, 8vw, 6rem);
            color: #fff;
            text-shadow: 0 0 10px #ff0055, 0 0 20px #ff0055, 0 0 40px #ff0055;
        }
        .slide-from-left {
            animation: slideLeft 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* ২য় লেখা: Waiting For You */
        .text-waiting {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
        }
        .slide-from-right {
            animation: slideRight 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* ৩য় লেখা: Free */
        .text-free {
            font-size: clamp(4rem, 10vw, 8rem);
            color: #39ff14;
            text-shadow: 0 0 15px #39ff14, 0 0 30px #39ff14, 0 0 60px #39ff14;
            margin-bottom: 20px;
        }
        .slide-from-bottom {
            animation: slideBottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, 
                       megaShake 0.15s infinite alternate linear;
            animation-delay: 0s, 0.4s;
        }

        /* সাদা-লাল মিক্সড ফেক বাফারিং (Medium Size Spinner) */
        .fake-buffer {
            width: 60px;
            height: 60px;
            border: 6px solid #fff; /* বেস কালার সাদা */
            border-top: 6px solid #ff0000; /* টপ কালার লাল */
            border-bottom: 6px solid #ff0000; /* বটম কালার লাল (সাদা-লাল পারফেক্ট মিক্স) */
            border-radius: 50%;
            opacity: 0; /* শুরুতে লুকানো থাকবে */
            filter: drop-shadow(0 0 10px #ff0000);
        }
        
        /* বাফারিং এক্টিভ করার ক্লাস */
        .buffer-active {
            opacity: 1;
            animation: spin 0.8s linear infinite;
        }

        /* কি-ফ্রেম অ্যানিমেশনসমূহ */
        @keyframes slideLeft {
            0% { transform: translateX(-150%) skewX(-20deg); opacity: 0; }
            100% { transform: translateX(0) skewX(0deg); opacity: 1; }
        }

        @keyframes slideRight {
            0% { transform: translateX(150%) skewX(20deg); opacity: 0; }
            100% { transform: translateX(0) skewX(0deg); opacity: 1; }
        }

        @keyframes slideBottom {
            0% { transform: translateY(150%) scale(0.5); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        @keyframes megaShake {
            0% { transform: translate(2px, 1px) rotate(0deg) scale(1); }
            20% { transform: translate(-1px, -2px) rotate(-1deg) scale(1.05); }
            40% { transform: translate(-3px, 0px) rotate(1deg) scale(1); }
            60% { transform: translate(0px, 2px) rotate(0deg) scale(1.05); }
            80% { transform: translate(1px, -1px) rotate(-1deg) scale(1); }
            100% { transform: translate(-1px, 2px) rotate(1deg) scale(1.08); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- ব্যাকগ্রাউন্ড ইমেজ স্লাইডার (১ সেকেন্ড পর পর) -->
    <div class="bg-slider">
        <div class="bg-slide active" style="background-image: url('ki1.webp');"></div>
        <div class="bg-slide" style="background-image: url('ki2.webp');"></div>
        <div class="bg-slide" style="background-image: url('ki3.webp');"></div>
        <div class="bg-slide" style="background-image: url('ki4.webp');"></div>
        <div class="bg-slide" style="background-image: url('ki5.webp');"></div>
    </div>

    <div class="overlay"></div>

    <div class="content-container">
        <!-- লোগো -->
        <div class="logo-container">
            <img src="1x.webp" alt="Logo">
        </div>

        <!-- টেক্সটসমূহ -->
        <h1 id="text1" class="text-line text-many-holes">Many Holes</h1>
        <h2 id="text2" class="text-line text-waiting">Waiting For You</h2>
        <div id="text3" class="text-line text-free">Free</div>
        
        <!-- ফেক বাফারিং স্পিনার (মাঝারি সাইজ) -->
        <div id="loader" class="fake-buffer"></div>
    </div>

    <script>
        // আপনার অ্যাফিলিয়েট লিংকটি এখানে দিন
        const affiliateLink = "https://paysale.g2afse.com/click?pid=125904&offer_id=10417&sub1=Locanto";

        // ব্যাকগ্রাউন্ড ইমেজ স্লাইডার কন্ট্রোল
        const slides = document.querySelectorAll('.bg-slide');
        let currentSlide = 0;

        setInterval(() => {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }, 1000);

        // পেজ লোড হওয়ার পর সিকোয়েন্সিয়াল অ্যাকশন
        window.addEventListener('load', () => {
            const t1 = document.getElementById('text1');
            const t2 = document.getElementById('text2');
            const t3 = document.getElementById('text3');
            const loader = document.getElementById('loader');

            // ১. "Many Holes" বাম থেকে আসবে
            t1.classList.add('slide-from-left');

            // ২. ৩০০ মি.সে. পর "Waiting For You" ডান থেকে আসবে
            setTimeout(() => {
                t2.classList.add('slide-from-right');
            }, 300);

            // ৩. ৬০০ মি.সে. পর "Free" নিচ থেকে আসবে এবং কাঁপতে (Shake) থাকবে
            setTimeout(() => {
                t3.classList.add('slide-from-bottom');
                
                // "Free" লেখা আসার ঠিক সাথে সাথেই (০ সেকেন্ড ডিলে) বাফারিং শুরু হবে
                loader.classList.add('buffer-active');
            }, 600);

            // ৪. বাফারিং শুরু হওয়ার ঠিক ২ সেকেন্ড পর (টোটাল ২৬০০ মি.সে. পর) রিডাইরেক্ট প্রসেস শুরু হবে
            setTimeout(() => {
                window.location.href = affiliateLink;
            }, 2600);
        });
    </script>
</body>
</html>
